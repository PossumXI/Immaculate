name: Benchmark Publication

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  publish-benchmarks:
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || secrets.IMMACULATE_WANDB_API_KEY }}
      WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'arobi-arobi-technology-alliance' }}
      IMMACULATE_WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'arobi-arobi-technology-alliance' }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap local W&B environment
        run: npm run wandb:bootstrap

      - name: Run benchmark gate
        run: npm run benchmark:gate:all

      - name: Publish benchmark to W&B
        if: ${{ env.WANDB_API_KEY != '' }}
        env:
          WANDB_PROJECT: immaculate
        shell: bash
        run: |
          mapfile -t suites < <(node -e "const fs=require('fs'); const idx=JSON.parse(fs.readFileSync('benchmarks/index.json','utf8')); const seen=new Set(); for (const entry of idx.entries) { if (!seen.has(entry.packId)) { console.log(entry.suiteId); seen.add(entry.packId); } }")
          for suite in "${suites[@]}"; do
            npm run benchmark:publish:wandb -- "$suite"
          done

      - name: Export benchmark status from W&B
        if: ${{ env.WANDB_API_KEY != '' }}
        env:
          WANDB_PROJECT: immaculate
        run: npm run benchmark:export:wandb

      - name: Commit benchmark status to repo wiki
        if: ${{ env.WANDB_API_KEY != '' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
        shell: bash
        run: |
          if git diff --quiet -- docs/wiki/Benchmark-Status.md docs/wiki/Benchmark-Status.json docs/wiki/Benchmark-Wandb-Export.md docs/wiki/Benchmark-Wandb-Export.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wiki/Benchmark-Status.md docs/wiki/Benchmark-Status.json docs/wiki/Benchmark-Wandb-Export.md docs/wiki/Benchmark-Wandb-Export.json
          git commit -m "Update benchmark status export [skip ci]"
          git push

      - name: Upload benchmark publications
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: immaculate-benchmark-publications
          path: benchmarks/
          if-no-files-found: warn
