name: Benchmark Publication

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  publish-benchmarks:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap local W&B environment
        run: npm run wandb:bootstrap

      - name: Run benchmark gate
        run: npm run benchmark:gate:all

      - name: Publish benchmark to W&B
        if: ${{ secrets.WANDB_API_KEY != '' }}
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: arobi-arobi-technology-alliance
          WANDB_PROJECT: immaculate
        run: npm run benchmark:publish:wandb

      - name: Upload benchmark publications
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: immaculate-benchmark-publications
          path: benchmarks/
