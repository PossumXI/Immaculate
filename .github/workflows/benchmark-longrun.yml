name: Benchmark Long Run

on:
  workflow_dispatch:
    inputs:
      pack_id:
        description: "Long-run benchmark pack to execute"
        required: true
        default: "latency-benchmark-60s"
        type: choice
        options:
          - latency-benchmark-60s
          - latency-soak-60m

jobs:
  long-run-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY || secrets.IMMACULATE_WANDB_API_KEY }}
      WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'arobi-arobi-technology-alliance' }}
      IMMACULATE_WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'arobi-arobi-technology-alliance' }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap local W&B environment
        run: npm run wandb:bootstrap

      - name: Build core workspace
        run: npm run build -w @immaculate/core

      - name: Run long-run benchmark
        env:
          WANDB_PROJECT: immaculate
        shell: bash
        run: |
          if [ -n "${WANDB_API_KEY}" ]; then
            npm run benchmark -w @immaculate/harness -- --pack="${{ inputs.pack_id }}" --publish-wandb
          else
            npm run benchmark -w @immaculate/harness -- --pack="${{ inputs.pack_id }}"
          fi

      - name: Export benchmark status from W&B
        if: ${{ env.WANDB_API_KEY != '' }}
        env:
          WANDB_PROJECT: immaculate
        run: npm run benchmark:export:wandb

      - name: Commit benchmark status to repo wiki
        if: ${{ env.WANDB_API_KEY != '' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
        shell: bash
        run: |
          if git diff --quiet -- docs/wiki/Benchmark-Status.md docs/wiki/Benchmark-Status.json docs/wiki/Benchmark-Wandb-Export.md docs/wiki/Benchmark-Wandb-Export.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wiki/Benchmark-Status.md docs/wiki/Benchmark-Status.json docs/wiki/Benchmark-Wandb-Export.md docs/wiki/Benchmark-Wandb-Export.json
          git commit -m "Update long-run benchmark status [skip ci]"
          git push

      - name: Upload long-run benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: immaculate-long-run-benchmark
          path: benchmarks/
          if-no-files-found: warn
