name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-gate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap local W&B environment
        run: npm run wandb:bootstrap

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run training-data smoke
        run: npm run training-data:smoke

      - name: Run benchmark gate
        run: npm run benchmark:gate:all

      - name: Upload benchmark publications
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: immaculate-benchmark-publications
          path: benchmarks/
          if-no-files-found: warn
