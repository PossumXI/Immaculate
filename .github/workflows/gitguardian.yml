name: GitGuardian

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gitguardian:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitGuardian disabled
        if: ${{ env.GITGUARDIAN_API_KEY == '' }}
        run: echo "GITGUARDIAN_API_KEY is not configured; skipping GitGuardian scan."

      - name: GitGuardian scan
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        uses: GitGuardian/ggshield-action@v1.50.0
        env:
          GITGUARDIAN_API_KEY: ${{ env.GITGUARDIAN_API_KEY }}
