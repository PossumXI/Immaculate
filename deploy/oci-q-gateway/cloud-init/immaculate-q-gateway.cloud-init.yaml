#cloud-config
package_update: true
package_upgrade: true

ssh_pwauth: false
disable_root: true

packages:
  - git
  - jq
  - curl
  - podman
  - firewalld
  - ca-certificates
  - policycoreutils-python-utils

write_files:
  - path: /etc/sysctl.d/61-immaculate-q-gateway.conf
    owner: root:root
    permissions: "0644"
    content: |
      fs.protected_hardlinks = 1
      fs.protected_symlinks = 1
      kernel.kptr_restrict = 2
      kernel.dmesg_restrict = 1
      kernel.unprivileged_bpf_disabled = 1
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.tcp_syncookies = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv6.conf.default.accept_redirects = 0
  - path: /etc/tmpfiles.d/immaculate-q-gateway.conf
    owner: root:root
    permissions: "0644"
    content: |
      d /etc/immaculate 0750 root root -
      d /var/lib/immaculate 0750 immaculate immaculate -
      d /var/lib/immaculate/q-gateway 0750 immaculate immaculate -
      d /var/log/immaculate 0750 immaculate immaculate -
      d /var/log/immaculate/q-gateway 0750 immaculate immaculate -
      d /opt/immaculate 0755 root root -
      d /opt/immaculate/src 0755 root root -

runcmd:
  - [bash, -lc, "id immaculate >/dev/null 2>&1 || useradd --system --uid 10001 --home-dir /var/lib/immaculate --shell /sbin/nologin immaculate"]
  - [systemd-tmpfiles, --create, /etc/tmpfiles.d/immaculate-q-gateway.conf]
  - [bash, -lc, "chown -R immaculate:immaculate /var/lib/immaculate /var/log/immaculate"]
  - [systemctl, enable, --now, firewalld]
  - [sysctl, --system]
  - [bash, -lc, "if command -v setenforce >/dev/null 2>&1 && [ \"$(getenforce 2>/dev/null || echo Disabled)\" != \"Disabled\" ]; then setenforce 1; fi"]

final_message: |
  OCI private Q gateway host bootstrap complete.
  Next steps:
    1. Clone Immaculate into /opt/immaculate/src
    2. Copy deploy/oci-q-gateway/env/immaculate-q-gateway.env.example to /etc/immaculate/immaculate-q-gateway.env
    3. Point IMMACULATE_OLLAMA_URL at the private Q backend host reachable from the gateway node
    4. Run sudo bash deploy/oci-q-gateway/scripts/install-oci-q-gateway.sh --enable
