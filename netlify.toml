[build]
  command = "npm run build -w @immaculate/core && npm run build -w @immaculate/dashboard"

  [build.environment]
    NODE_VERSION = "22"

[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"

[[redirects]]
  from = "/api/jaws/*"
  to = "/.netlify/functions/jaws/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/downloads/jaws/windows"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/JAWS_0.2.2_x64-setup.exe"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/jaws/windows-msi"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/JAWS_0.2.2_x64_en-US.msi"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/jaws/macos"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/JAWS_0.2.2_x64.dmg"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/jaws/linux-deb"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/JAWS_0.2.2_amd64.deb"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/jaws/linux-rpm"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/JAWS-0.2.2-1.x86_64.rpm"
  status = 302
  force = true

[[redirects]]
  from = "/downloads/jaws/latest.json"
  to = "https://github.com/PossumXI/OpenJaws/releases/download/jaws-v0.2.2/latest.json"
  status = 302
  force = true
